# GoReleaser configuration — https://goreleaser.com
# Builds cross-platform binaries and attaches them to a GitHub Release on tag push.
# Secret-free: the release workflow uses the automatic GITHUB_TOKEN.
version: 2

project_name: magicmix

before:
  hooks:
    - go mod tidy

builds:
  - id: magicmix
    main: ./cmd/magicmix
    binary: magicmix
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on ARM is niche and untested; skip it.
      - goos: windows
        goarch: arm64

archives:
  - id: magicmix
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
